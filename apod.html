<!DOCTYPE html>
<html lang="en">
<head>
    <title>NASA APOD | Saturn & Stars</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="/src/css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Roboto:wght@300;400;500;700;900&display=swap" rel="stylesheet">
</head>

<body>

<header class="site-header">
    <nav class="navbar">
        <a href="/index.html" class="nav-brand">
            <img src="/src/assets/saturn-stars-logocut.png" alt="Saturn and Stars Logo" class="nav-logo">
            <span class="site-title heading">Saturn & Stars</span>
        </a>

        <button class="hamburger" id="hamburger-btn" aria-label="Toggle navigation menu">
            <span></span>
            <span></span>
            <span></span>
        </button>

        <button id="theme-toggle">🌙</button>

        <ul class="nav-list">
            <li><a href="/index.html" class="nav-link">HOME</a></li>
            <li><a href="/apod.html" class="nav-link active">APOD</a></li>
            <li><a href="/epic.html" class="nav-link">EPIC</a></li>
            <li><a href="/favorites.html" class="nav-link">FAVORITES</a></li>
        </ul>
    </nav>
</header>

<main>

    <!-- ================= CONTROL PANEL ================= -->
    <section class="apod-control-panel">
        <h1 class="page-title heading">Astronomy Picture of the Day</h1>

        <div class="control-row">
            <label for="apod-date" class="control-label">Select Date</label>
            <input type="date" id="apod-date" class="control-input">
            <button id="apod-load-btn" class="btn primary">Load APOD</button>
        </div>
    </section>

    <!-- ================= APOD CONTENT ================= -->
    <section id="apod-container" class="apod-layout">
        <!-- JS will inject:
            - .apod-media
            - .apod-info
            - .apod-description
            - .apod-meta
            - .apod-save-btn
        -->
    </section>

</main>
<div id="image-modal" class="modal hidden">
    <div class="modal-content">
        <span id="modal-close" class="modal-close">&times;</span>
        <img id="modal-image" src="" alt="Full View" class="modal-img">
        <p id="modal-caption" class="modal-caption"></p>
    </div>
</div>
<footer class="site-footer">
  <p>Saturn & Stars © 2026 — Powered by NASA APIs</p>
</footer>

<script type="module" src="/src/js/apod.js"></script>
<script type="module" src="/src/js/main.js"></script>
</body>
</html>
